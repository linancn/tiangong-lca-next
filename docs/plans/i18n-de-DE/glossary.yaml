schemaVersion: 'tiangong.i18n-de-glossary.v1'
issue: 'https://github.com/linancn/tiangong-lca-next/issues/601'

localePolicy:
  canonicalTag: 'de-DE'
  displayName: 'Deutsch'
  regionalVariants: false
  vocabulary: 'region-neutral-standard-german'
  orthography: 'de-DE'
  addressForm: 'formal-Sie'
  fallbackRule: 'Every de or de-* request resolves to the one de-DE bundle.'

governance:
  status: 'proposed-awaiting-local-pilot-confirmation'
  confirmationStorage: 'ignored local Markdown; never committed or uploaded'
  reviewerModel: 'one local reviewer may confirm product-context, native-German, and LCA/TIDAS dimensions'
  sourcePriority:
    - 'TianGong runtime context, canonical English, and Chinese disambiguation evidence'
    - 'Approved project glossary decisions'
    - 'TIDAS and ILCD concept definitions'
    - 'German LCA authorities listed in evidence-sources.yaml'
    - 'German orthography and UI style authorities listed in evidence-sources.yaml'
  conflictRule: 'Mark BLOCKED_TERM; translators must not choose between conflicting sources.'
  machineTranslationRule: 'Machine translation and LLM output may propose candidates but are never approval evidence.'
  requiredHumanReviews:
    nativeGerman: '100% of messages'
    lcaTidasDomain: '100% of all 2,665 canonical messages under the conservative no-exemption policy'

terms:
  - termId: 'lca.assessment'
    sourceEnglish: 'Life Cycle Assessment'
    sourceChinese: ['生命周期评价']
    germanPreferred: 'Ökobilanz'
    abbreviation: 'LCA'
    includeContexts: ['discipline, method, or completed assessment']
    excludeContexts: ['life cycle model data-set type', 'impact assessment phase']
    forbidden: ['Lebenszyklusbewertung']
    evidenceRefs: ['uba-oekobilanz', 'din-iso-14040', 'din-iso-14044']
    risk: 'critical'
    decisionStatus: 'proposed'

  - termId: 'lca.life-cycle-model'
    sourceEnglish: 'Life cycle model'
    sourceChinese: ['生命周期模型']
    germanPreferred: 'Lebenszyklusmodell'
    includeContexts: ['TIDAS/ILCD model entity and its data set']
    excludeContexts: ['generic model', 'completed life cycle assessment']
    forbidden: ['Modell when the data-set type must remain explicit']
    evidenceRefs: ['ilcd-life-cycle-model-format']
    risk: 'critical'
    decisionStatus: 'proposed'

  - termId: 'lca.process'
