# localized validation helpers, and full-coverage gate collection updates.
docInventory:
  include:
    - AGENTS.md
    - DEV.md
    - README.md
    - README_CN.md
    - .docpact/config.yaml
    - docs/agents/repo-validation.md
    - docs/agents/repo-architecture.md
    - docs/agents/supabase-branching.md
    - docs/agents/test_todo_list.md
    - docs/agents/testing-patterns.md
    - docs/agents/testing-troubleshooting.md
    - docs/agents/prepush-gate-policy.md
    - docs/agents/test_improvement_plan.md
    - docs/agents/contribution-path-analysis-design.md
    - docs/agents/lca-analysis-visualization-plan.md
    - docs/agents/public-classifications-gz-usage.md
    - docs/agents/util_calculate.md
    - docs/agents/team_management.md
    - docs/agents/data_audit_instruction.md
    - .github/PULL_REQUEST_TEMPLATE/feature-to-dev.md
    - .github/PULL_REQUEST_TEMPLATE/promote-dev-to-main.md

repo:
  id: next
  owner: next
  runtime: node

rules:
  - id: next-bootstrap-contract
    scope: repo
    repo: next
    triggers:
      - path: AGENTS.md
        kind: doc-contract
      - path: DEV.md
        kind: doc-entry
      - path: .docpact/**
        kind: doc-ai-layer
      - path: docs/agents/repo-validation.md
        kind: deep-doc
      - path: docs/agents/repo-architecture.md
        kind: deep-doc
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: DEV.md
        mode: review_or_update
    reason: Repo entry guidance, machine-readable routing, and bootstrap docs must stay aligned.
  - id: next-readme-and-landing-contract
    scope: repo
    repo: next
    triggers:
      - path: README.md
        kind: repo-landing
      - path: README_CN.md
        kind: repo-landing
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: README.md
        mode: review_or_update
      - path: README_CN.md
        mode: review_or_update
    reason: Repo landing docs should stay aligned with the repo contract and current entry guidance.
  - id: next-pr-handoff-contract
    scope: repo
    repo: next
    triggers:
      - path: .github/PULL_REQUEST_TEMPLATE/feature-to-dev.md
        kind: pr-template
      - path: .github/PULL_REQUEST_TEMPLATE/promote-dev-to-main.md
        kind: pr-template
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: docs/agents/repo-validation.md
        mode: review_or_update
      - path: .github/PULL_REQUEST_TEMPLATE/feature-to-dev.md
        mode: review_or_update
      - path: .github/PULL_REQUEST_TEMPLATE/promote-dev-to-main.md
        mode: review_or_update
    reason: Repo handoff templates should stay aligned with the repo contract and the validation note shape.
  - id: next-frontend-runtime-contract
    scope: repo
    repo: next
    triggers:
      - path: config/routes.ts
        kind: route-tree
      - path: config/config.ts
        kind: app-config
      - path: config/defaultSettings.ts
        kind: app-config
      - path: config/oneapi.json
        kind: app-config
      - path: config/proxy.ts
        kind: app-config
      - path: src/app.tsx
        kind: app-runtime
      - path: src/access.ts
        kind: app-runtime
      - path: src/contexts/**
        kind: app-runtime
      - path: src/global.less
        kind: app-runtime
      - path: src/global.tsx
        kind: app-runtime
      - path: src/manifest.json
        kind: app-runtime
      - path: src/pages/**
        kind: page-ui
      - path: src/components/**
        kind: shared-ui
      - path: src/locales/**
        kind: ui-locale
      - path: src/requestErrorConfig.ts
        kind: app-runtime
      - path: src/service-worker.js
        kind: app-runtime
      - path: src/style/**
        kind: app-runtime
      - path: src/typings.d.ts
        kind: app-runtime
      - path: src/utils/appUrl.ts
        kind: app-runtime
      - path: src/utils/ruleVerification.ts
        kind: app-runtime
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/agents/repo-validation.md
        mode: review_or_update
      - path: docs/agents/repo-architecture.md
        mode: review_or_update
    reason: Frontend runtime and app-shell support changes alter the shipped product surface and should refresh the repo routing, proof rules, and architecture map.
  - id: next-data-boundary-contract
    scope: repo
    repo: next
    triggers:
      - path: config/supabaseEnv.ts
        kind: env-selection
      - path: src/services/**
        kind: service-logic
      - path: docs/agents/supabase-branching.md
        kind: domain-doc
      - path: docker/**
        kind: local-stack
    requiredDocs:
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/agents/repo-validation.md
        mode: review_or_update
      - path: docs/agents/repo-architecture.md
        mode: review_or_update
      - path: docs/agents/supabase-branching.md
        mode: review_or_update
