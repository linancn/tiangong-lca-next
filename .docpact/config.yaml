version: 1
layout: repo
lastReviewedAt: "2026-04-28"
lastReviewedCommit: "bc446e0fcc3bcdbe022f76f62731247b25d6bdfb"

# Keep path-level ownership, routing intents, and governed-doc rules here.
# AGENTS.md keeps the entry-level repo contract and minimal execution summary.
# DEV.md and repo-validation own the full command and proof details.
catalog:
  repos:
    - id: next
      path: .
      canonicalRepo: linancn/tiangong-lca-next
      entryDoc: AGENTS.md
      workflowDocs:
        - DEV.md
        - docs/agents/repo-validation.md
      workspaceIntegrationRequired: true

ownership:
  domains:
    - id: frontend-product-ui-and-runtime
      paths:
        include:
          - config/**
          - src/**
          - public/**
          - docker/**
          - electron/**
          - electron-builder.json
          - icons/**
      ownerRepo: next
    - id: repo-governance-and-bootstrap-docs
      paths:
        include:
          - AGENTS.md
          - DEV.md
          - README.md
          - README_CN.md
          - .docpact/**
          - docs/agents/**
          - .github/PULL_REQUEST_TEMPLATE/*.md
      ownerRepo: next
    - id: repo-testing-and-quality-gates
      paths:
        include:
          - tests/**
          - package.json
          - .nvmrc
          - jest.config.cjs
          - .husky/pre-push
          - .github/workflows/ci.yml
          - .github/workflows/build.yml
          - .github/workflows/ai-doc-lint.yml
          - scripts/test-runner.cjs
          - scripts/test-coverage-report.js
      ownerRepo: next

coverage:
  include:
    - AGENTS.md
    - DEV.md
    - README.md
    - README_CN.md
    - .docpact/**
    - docs/agents/repo-validation.md
    - docs/agents/repo-architecture.md
    - docs/agents/supabase-branching.md
    - docs/agents/test_todo_list.md
    - docs/agents/testing-patterns.md
    - docs/agents/testing-troubleshooting.md
    - docs/agents/prepush-gate-policy.md
    - docs/agents/test_improvement_plan.md
    - docs/agents/contribution-path-analysis-design.md
    - docs/agents/lca-analysis-visualization-plan.md
    - docs/agents/public-classifications-gz-usage.md
    - docs/agents/util_calculate.md
    - docs/agents/team_management.md
    - docs/agents/data_audit_instruction.md
    - .github/PULL_REQUEST_TEMPLATE/*.md
    - config/**
    - src/**
    - public/**
    - docker/**
    - electron/**
    - icons/**
    - tests/**
    - package.json
    - .nvmrc
    - jest.config.cjs
    - .husky/pre-push
    - .github/workflows/ai-doc-lint.yml
    - .github/workflows/build.yml
    - .github/workflows/ci.yml
    - scripts/test-runner.cjs
    - scripts/test-coverage-report.js
  exclude:
    - node_modules/**
    - dist/**
    - coverage/**
    - build/**
    - docker/README.md
    - docker/README.zh-CN.md

freshness:
  warn_after_commits: 40
  warn_after_days: 60
  critical_after_days: 120

routing:
  intents:
    page-ui:
      paths:
        - config/routes.ts
        - src/app.tsx
        - src/pages/**
        - src/components/**
        - src/locales/**
    service-env:
      paths:
        - config/supabaseEnv.ts
        - src/services/auth/**
        - src/services/general/api.ts
        - src/services/supabase/**
        - docker/**
    testing-gates:
      paths:
        - package.json
        - .nvmrc
        - jest.config.cjs
        - .husky/pre-push
        - .github/workflows/ci.yml
        - .github/workflows/build.yml
        - .github/workflows/ai-doc-lint.yml
        - scripts/test-runner.cjs
        - scripts/test-coverage-report.js
        - tests/**
    repo-docs:
      paths:
        - AGENTS.md
        - DEV.md
        - README.md
        - README_CN.md
        - .docpact/**
        - docs/agents/repo-validation.md
        - docs/agents/repo-architecture.md
        - docs/agents/supabase-branching.md
        - docs/agents/test_todo_list.md
        - docs/agents/testing-patterns.md
        - docs/agents/testing-troubleshooting.md
        - docs/agents/prepush-gate-policy.md
        - docs/agents/test_improvement_plan.md
        - docs/agents/contribution-path-analysis-design.md
        - docs/agents/lca-analysis-visualization-plan.md
        - docs/agents/public-classifications-gz-usage.md
        - docs/agents/util_calculate.md
        - docs/agents/team_management.md
        - docs/agents/data_audit_instruction.md
        - .github/PULL_REQUEST_TEMPLATE/*.md
    proof:
      paths:
        - package.json
        - .nvmrc
        - jest.config.cjs
        - .husky/pre-push
        - .github/workflows/ci.yml
        - .github/workflows/build.yml
        - tests/**
        - docs/agents/test_todo_list.md
        - docs/agents/testing-patterns.md
        - docs/agents/testing-troubleshooting.md
        - docs/agents/prepush-gate-policy.md
        - docs/agents/test_improvement_plan.md
    repo-shape:
      paths:
        - config/**
        - src/**
        - public/**
        - docker/**
        - electron/**
        - docs/agents/repo-architecture.md
    lifecycle-model-ui:
      paths:
        - src/services/lifeCycleModels/**
        - src/services/lca/**
        - src/components/LcaTaskCenter/**
        - src/pages/Processes/Analysis/**
        - docs/agents/contribution-path-analysis-design.md
        - docs/agents/lca-analysis-visualization-plan.md
    team-and-review-management:
      paths:
        - src/pages/Review/**
        - src/pages/ManageSystem/**
        - src/pages/Teams/**
    classification-assets:
      paths:
        - public/classifications/**
        - public/locations/**
        - public/lciamethods/**

