name: Build/release

# Releases normally start from a main push whose package.json version is new.
# The workflow creates the matching v* tag and runs the release in the same run.
# Manual v* tag pushes and workflow_dispatch runs remain supported for recovery/backfill releases.
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing v* tag to release with the current workflow definition.
        required: true
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-context:
    name: Release Context
    runs-on: ubuntu-latest
    outputs:
      release_base: ${{ steps.release.outputs.release_base }}
      release_head: ${{ steps.release.outputs.release_head }}
      should_release: ${{ steps.release.outputs.should_release }}
      tag_created: ${{ steps.release.outputs.tag_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve release target
        id: release
        env:
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
          REQUESTED_TAG_NAME: ${{ github.event.inputs.tag_name || '' }}
        run: |
          set -euo pipefail

          git fetch --force origin +refs/heads/main:refs/remotes/origin/main
          git fetch --force origin '+refs/tags/*:refs/tags/*'

          if [ "${GITHUB_REPOSITORY}" != "linancn/tiangong-lca-next" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping release outside canonical repository: ${GITHUB_REPOSITORY}."
            exit 0
          fi

          read_package_version() {
            git show "${1}:package.json" | node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(pkg.version);"
          }

          tag_created=false

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag_name="${REQUESTED_TAG_NAME}"
            if [ -z "${tag_name}" ] || [[ "${tag_name}" != v* ]]; then
              echo "::error::workflow_dispatch tag_name must be an existing v* tag."
              exit 1
            fi

            if ! release_head="$(git rev-list -n 1 "${tag_name}" 2>/dev/null)"; then
              echo "::error::Release tag ${tag_name} does not exist."
              exit 1
            fi

            package_version="$(read_package_version "${release_head}")"
            expected_tag="v${package_version}"
            if [ "${tag_name}" != "${expected_tag}" ]; then
              echo "::error::Release tag ${tag_name} does not match package.json version ${package_version} at ${release_head}."
              exit 1
            fi

            echo "::notice::Releasing existing ${tag_name} at ${release_head} with the current workflow definition."
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag_name="${GITHUB_REF_NAME}"
            release_head="$(git rev-list -n 1 "${tag_name}")"
            package_version="$(read_package_version "${release_head}")"
            expected_tag="v${package_version}"
            if [ "${tag_name}" != "${expected_tag}" ]; then
              echo "::error::Release tag ${tag_name} does not match package.json version ${package_version} at ${release_head}."
              exit 1
            fi
          else
            release_head="${GITHUB_SHA}"
            package_version="$(read_package_version "${release_head}")"
            expected_tag="v${package_version}"
            tag_name="${expected_tag}"
            package_version_changed=true

            if [ -n "${PUSH_BEFORE_SHA}" ] && [ "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
              previous_package_version="$(read_package_version "${PUSH_BEFORE_SHA}")"
              if [ "${previous_package_version}" = "${package_version}" ]; then
                package_version_changed=false
              fi
            fi

            existing_tag_sha="$(git ls-remote --tags origin "refs/tags/${tag_name}" | awk '{print $1}')"
            if [ -n "${existing_tag_sha}" ]; then
              git fetch --force origin "refs/tags/${tag_name}:refs/tags/${tag_name}"
              existing_tag_commit="$(git rev-list -n 1 "${tag_name}")"
              if [ "${existing_tag_commit}" != "${release_head}" ]; then
                if [ "${package_version_changed}" = "false" ]; then
                  echo "should_release=false" >> "$GITHUB_OUTPUT"
                  echo "tag_created=false" >> "$GITHUB_OUTPUT"
                  echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
                  echo "release_head=${release_head}" >> "$GITHUB_OUTPUT"
                  echo "::notice::${tag_name} already points to ${existing_tag_commit}; package.json version was unchanged in this main push, so this workflow hotfix is not a new release."
                  exit 0
                fi

                echo "::error::${tag_name} already points to ${existing_tag_commit}, not current main commit ${release_head}. Bump package.json before releasing another main commit."
                exit 1
              fi
              echo "::notice::${tag_name} already exists on current main commit ${release_head}; continuing release."
            else
              git tag "${tag_name}" "${release_head}"
              git push origin "refs/tags/${tag_name}"
              tag_created=true
              echo "::notice::Created ${tag_name} on ${release_head}."
            fi
          fi

          if ! git merge-base --is-ancestor "${release_head}" origin/main; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag_created=${tag_created}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
            echo "release_head=${release_head}" >> "$GITHUB_OUTPUT"
            echo "::notice::Release target ${tag_name} points to ${release_head}, which is not on origin/main. Skipping web deploy and Electron release."
            exit 0
          fi

          release_base="$(git rev-parse "${release_head}^")"

          echo "release_base=${release_base}" >> "$GITHUB_OUTPUT"
          echo "release_head=${release_head}" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag_created=${tag_created}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

          {
            echo "### Release context"
            echo "- tag: \`${tag_name}\`"
            echo "- head: \`${release_head}\`"
            echo "- base: \`${release_base}\`"
            echo "- package version: \`${package_version}\`"
            echo "- tag created: \`${tag_created}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  release-gate:
    name: Release Gate
    needs: release-context
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-context.outputs.release_head }}
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Fetch main
        run: git fetch --force origin +refs/heads/main:refs/remotes/origin/main

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install docpact
        run: cargo install docpact --version 0.1.9 --force

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') || hashFiles('npm-shrinkwrap.json') || hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Verify reviewed LCIA cache bundle
        run: npm run lcia-cache:verify

      - name: Run docpact release gate
        run: |
          set -euo pipefail
          release_head="${{ needs.release-context.outputs.release_head }}"
          release_base="${{ needs.release-context.outputs.release_base }}"
          npm run docpact:gate -- --base "$release_base" --head "$release_head"

      - name: Verify all-locale production readiness
        run: npm run i18n:locale:all:production:check

      - name: Verify reference-resource production readiness
        run: npm run reference-data:production:check

      - name: Run full release gate
        run: npm run prepush:gate

  release-semantic-e2e:
    name: Release Semantic E2E
    needs: release-context
    if: needs.release-context.outputs.should_release == 'true'
    uses: ./.github/workflows/i18n-semantic-e2e.yml
    with:
      ref: ${{ needs.release-context.outputs.release_head }}

  release-draft:
    name: Prepare Unique Draft Release
    needs:
      - release-context
      - release-gate
      - release-semantic-e2e
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Ensure exactly one draft release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_HEAD: ${{ needs.release-context.outputs.release_head }}
          TAG_NAME: ${{ needs.release-context.outputs.tag_name }}
        run: |
          set -euo pipefail

          releases_json="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" | jq -s 'add'
          )"
          release_count="$(jq --arg tag "${TAG_NAME}" '[.[] | select(.tag_name == $tag)] | length' <<< "${releases_json}")"

          if [ "${release_count}" -gt 1 ]; then
            echo "::error::Found ${release_count} releases for ${TAG_NAME}; refusing parallel publication into an ambiguous release."
            exit 1
          fi

          if [ "${release_count}" -eq 0 ]; then
            release_id="$(
              gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
                -f tag_name="${TAG_NAME}" \
                -f target_commitish="${RELEASE_HEAD}" \
                -f name="${TAG_NAME#v}" \
                -F draft=true \
                -F prerelease=false \
                --jq '.id'
            )"
            echo "Created draft release ${release_id} for ${TAG_NAME}."
          else
            release_id="$(jq -r --arg tag "${TAG_NAME}" '[.[] | select(.tag_name == $tag)][0].id' <<< "${releases_json}")"
            echo "Reusing draft release ${release_id} for ${TAG_NAME}."
          fi

          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
          actual_tag="$(jq -r '.tag_name' <<< "${release_json}")"
          actual_target="$(jq -r '.target_commitish' <<< "${release_json}")"
          is_draft="$(jq -r '.draft' <<< "${release_json}")"

          if [ "${actual_tag}" != "${TAG_NAME}" ]; then
            echo "::error::Release ${release_id} uses tag ${actual_tag}, expected ${TAG_NAME}."
            exit 1
          fi
          if [ "${actual_target}" != "${RELEASE_HEAD}" ]; then
            echo "::error::Release ${release_id} targets ${actual_target}, expected ${RELEASE_HEAD}."
            exit 1
          fi
          if [ "${is_draft}" != "true" ]; then
            echo "::error::Release ${release_id} is not a draft; refusing draft publication."
            exit 1
          fi

          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"
          {
            echo "### Prepared Electron release"
            echo "- tag: \`${TAG_NAME}\`"
            echo "- head: \`${RELEASE_HEAD}\`"
            echo "- draft release id: \`${release_id}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  web-deploy:
    name: Build and Deploy Web App
    needs:
      - release-context
      - release-gate
      - release-semantic-e2e
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      EDGEONE_OUTPUT_DIR: dist
      EDGEONE_PROJECT_NAME: tiangong-lca-next-upload
      EDGEONE_CLI_VERSION: 1.4.6
      EDGEONE_VITEST_VERSION: 3.2.4
      EDGEONE_VITE_NODE_VERSION: 3.2.4

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-context.outputs.release_head }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') || hashFiles('npm-shrinkwrap.json') || hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to EdgeOne Pages
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${EDGEONE_API_TOKEN:-}" ]; then
            echo "::error::EDGEONE_API_TOKEN secret is not configured."
            exit 1
          fi

          edgeone_cli_dir="$(mktemp -d)"
          cleanup_edgeone_cli() {
            rm -rf "$edgeone_cli_dir"
          }
          trap cleanup_edgeone_cli EXIT

          npm --prefix "$edgeone_cli_dir" install \
            --prefer-offline \
            --no-save \
            --ignore-scripts \
            --package-lock=false \
            --no-audit \
            --no-fund \
            "edgeone@${EDGEONE_CLI_VERSION}" \
            "vitest@${EDGEONE_VITEST_VERSION}" \
            "vite-node@${EDGEONE_VITE_NODE_VERSION}"

          edgeone_bin="$edgeone_cli_dir/node_modules/.bin/edgeone"
          if [ ! -x "$edgeone_bin" ]; then
            echo "::error::EdgeOne CLI binary was not installed at ${edgeone_bin}."
            exit 1
          fi

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Deploying to EdgeOne Pages, attempt ${attempt}/${max_attempts}."

            if timeout 300s "$edgeone_bin" pages deploy "$EDGEONE_OUTPUT_DIR" -n "$EDGEONE_PROJECT_NAME" -t "$EDGEONE_API_TOKEN"; then
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "EdgeOne Pages deploy failed after ${max_attempts} attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "EdgeOne Pages deploy failed. Retrying in ${sleep_seconds}s."
            sleep "$sleep_seconds"
          done

  release:
    needs:
      - release-context
      - release-gate
      - release-draft
      - release-semantic-e2e
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-context.outputs.release_head }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build/release Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx tsc --project tsconfig.electron.json
          npx electron-builder --config electron-builder.json --publish always --${{ matrix.arch }}

  verify-release:
    name: Verify Unique Complete Electron Release
    needs:
      - release-context
      - release-draft
      - release
    if: needs.release-context.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Verify release identity and assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREPARED_RELEASE_ID: ${{ needs.release-draft.outputs.release_id }}
          RELEASE_HEAD: ${{ needs.release-context.outputs.release_head }}
          TAG_NAME: ${{ needs.release-context.outputs.tag_name }}
        run: |
          set -euo pipefail

          releases_json="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" | jq -s 'add'
          )"
          release_count="$(jq --arg tag "${TAG_NAME}" '[.[] | select(.tag_name == $tag)] | length' <<< "${releases_json}")"
          if [ "${release_count}" -ne 1 ]; then
            echo "::error::Expected exactly one release for ${TAG_NAME}, found ${release_count}."
            exit 1
          fi
          observed_release_id="$(jq -r --arg tag "${TAG_NAME}" '[.[] | select(.tag_name == $tag)][0].id' <<< "${releases_json}")"
          if [ "${observed_release_id}" != "${PREPARED_RELEASE_ID}" ]; then
            echo "::error::Release identity changed from ${PREPARED_RELEASE_ID} to ${observed_release_id}."
            exit 1
          fi

          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${PREPARED_RELEASE_ID}")"
          actual_tag="$(jq -r '.tag_name' <<< "${release_json}")"
          actual_target="$(jq -r '.target_commitish' <<< "${release_json}")"
          is_draft="$(jq -r '.draft' <<< "${release_json}")"
          asset_count="$(jq '.assets | length' <<< "${release_json}")"

          if [ "${actual_tag}" != "${TAG_NAME}" ]; then
            echo "::error::Release uses tag ${actual_tag}, expected ${TAG_NAME}."
            exit 1
          fi
          if [ "${actual_target}" != "${RELEASE_HEAD}" ]; then
            echo "::error::Release targets ${actual_target}, expected ${RELEASE_HEAD}."
            exit 1
          fi
          if [ "${is_draft}" != "true" ]; then
            echo "::error::Release ${PREPARED_RELEASE_ID} is not a draft."
            exit 1
          fi
          if [ "${asset_count}" -ne 12 ]; then
            echo "::error::Expected 12 release assets, found ${asset_count}."
            jq -r '.assets[].name' <<< "${release_json}"
            exit 1
          fi

          version="${TAG_NAME#v}"
          expected_assets=(
            "TianGong-LCA-${version}-arm64.dmg"
            "TianGong-LCA-${version}-arm64.dmg.blockmap"
            "TianGong-LCA-Setup-${version}.exe"
            "TianGong-LCA-Setup-${version}.exe.blockmap"
            "latest-linux-arm64.yml"
            "latest-linux.yml"
            "latest-mac.yml"
            "latest.yml"
            "tiangong-lca-next-${version}.aarch64.rpm"
            "tiangong-lca-next-${version}.x86_64.rpm"
            "tiangong-lca-next_${version}_amd64.deb"
            "tiangong-lca-next_${version}_arm64.deb"
          )

          for asset_name in "${expected_assets[@]}"; do
            if ! jq -e --arg name "${asset_name}" '.assets[] | select(.name == $name and .state == "uploaded" and .size > 0)' <<< "${release_json}" >/dev/null; then
              echo "::error::Missing, empty, or incomplete release asset: ${asset_name}."
              exit 1
            fi
          done

          {
            echo "### Verified Electron release"
            echo "- tag: \`${TAG_NAME}\`"
            echo "- head: \`${RELEASE_HEAD}\`"
            echo "- unique draft release id: \`${PREPARED_RELEASE_ID}\`"
            echo "- assets: \`${asset_count}/12\`"
            echo
            jq -r '.assets | sort_by(.name)[] | "- `\(.name)` (\(.size) bytes)"' <<< "${release_json}"
          } >> "$GITHUB_STEP_SUMMARY"
